<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>त्रयी AI — संस्कृत-सम्भाषणम्</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #1a0a00;
            color: #f0d080;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 32px;
            border-bottom: 1px solid #5a3a00;
            background-color: #120700;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #5a3a00, #2a1500);
            border: 2px solid #c8860a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        .logo-text h1 {
            font-size: 1.8rem;
            color: #f0a830;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: #c8860a;
            font-style: italic;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .welcome {
            text-align: center;
            padding: 20px;
        }

        .om {
            font-size: 4rem;
            color: #f0a830;
            margin-bottom: 16px;
        }

        .welcome h2 {
            font-size: 1.8rem;
            color: #f0a830;
            margin-bottom: 12px;
        }

        .welcome p {
            font-size: 1rem;
            color: #c8a060;
            font-style: italic;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ಹೊಸ ಮಾಡ್ಯೂಲ್ (ಬಾಕ್ಸ್) ವಿನ್ಯಾಸ */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .module-card {
            background: #1a0a00;
            border: 1px solid #5a3a00;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .module-card:hover {
            border-color: #f0a830;
            background: #2a1500;
            transform: translateY(-2px);
        }

        .module-card.active {
            border-color: #f0a830;
            background: #3a2000;
            box-shadow: 0 0 15px rgba(200, 134, 10, 0.3);
        }

        .module-card.disabled {
            opacity: 0.6;
            border-style: dashed;
        }

        .module-card.disabled:hover {
            border-color: #8a6030;
            transform: none;
        }

        .module-card h3 {
            color: #f0d080;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .module-card p {
            color: #c8a060;
            font-size: 0.85rem;
            font-style: italic;
        }

        .chat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
            min-height: 200px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 8px;
            line-height: 1.7;
            font-size: 1.05rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .bot {
            background-color: #2a1500;
            border: 1px solid #5a3a00;
            align-self: flex-start;
            color: #f0d080;
        }

        .user {
            background-color: #3a2000;
            border: 1px solid #c8860a;
            align-self: flex-end;
            color: #f0d080;
        }

        .file-info-container {
            background: #120700;
            padding: 0 16px;
            text-align: right;
        }
        
        #file-info {
            color: #c8860a;
            font-size: 0.85rem;
            display: none;
            padding-top: 5px;
            font-style: italic;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #120700;
            border-top: 1px solid #5a3a00;
            position: sticky;
            bottom: 0;
            align-items: center;
        }

        .attach-btn {
            background: #2a1500;
            border: 1px solid #5a3a00;
            color: #f0d080;
            width: 50px;
            height: 50px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .attach-btn:hover {
            background: #3a2000;
            border-color: #c8860a;
        }

        input[type="text"] {
            flex: 1;
            background: #2a1500;
            border: 1px solid #5a3a00;
            color: #f0d080;
            padding: 14px 18px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            outline: none;
        }

        input[type="text"]::placeholder { color: #8a6030; }
        input[type="text"]:focus { border-color: #c8860a; }

        .send-btn {
            background: #c8860a;
            border: none;
            color: #1a0a00;
            width: 50px;
            height: 50px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.3rem;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover { background: #f0a830; }

        .loading { opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>

<header>
    <div class="logo-circle">🪷</div>
    <div class="logo-text">
        <h1>त्रयी AI</h1>
        <p>Sanskrit Research Suite · Team Trayee</p>
    </div>
</header>

<div class="chat-container">
    <div id="welcome-section">
        <div class="welcome">
            <div class="om">ॐ</div>
            <h2>त्रयी AI — संस्कृत व्याकरण सहायकः</h2>
            <p>Select a module below to begin your analysis or conversation.</p>
        </div>

        <div class="modules-grid">
            <div class="module-card active" id="mode-chat" onclick="setMode('chat')">
                <h3>सम्वादः</h3>
                <p>General Chat</p>
            </div>
            
            <div class="module-card" id="mode-shloka" onclick="setMode('shloka')">
                <h3>पद्यार्थः</h3>
                <p>Meaning of Verses</p>
            </div>
            
            <div class="module-card disabled" onclick="showComingSoon('व्याकरण-सन्दर्भः (Grammar Corpus Search)')">
                <h3>व्याकरण-सन्दर्भः</h3>
                <p>Grammar Corpus Search</p>
            </div>
            
            <div class="module-card disabled" onclick="showComingSoon('वेदान्त-सन्दर्भः (Vedanta Corpus Search)')">
                <h3>वेदान्त-सन्दर्भः</h3>
                <p>Vedanta Corpus Search</p>
            </div>
        </div>
    </div>

    <div class="chat-box" id="chatBox"></div>
</div>

<div class="file-info-container">
    <div id="file-info"></div>
</div>

<div class="input-area">
    <label for="fileUpload" class="attach-btn" title="Upload File">📎</label>
    <input type="file" id="fileUpload" style="display: none;" accept=".txt">

    <input type="text" id="userInput" 
           placeholder="संस्कृतपदं वा वाक्यं वा लिखत... (Type Sanskrit word or question)"
           autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">▶</button>
</div>

<script>
    let currentMode = 'chat';

    document.getElementById('fileUpload').addEventListener('change', function() {
        const fileInfo = document.getElementById('file-info');
        if (this.files.length > 0) {
            fileInfo.innerText = "📎 Selected File: " + this.files[0].name;
            fileInfo.style.display = 'block';
        } else {
            fileInfo.style.display = 'none';
        }
    });

    // Box 1 ಮತ್ತು Box 2 ಬದಲಾಯಿಸುವ ಲಾಜಿಕ್
    function setMode(mode) {
        currentMode = mode;
        const inputField = document.getElementById('userInput');
        
        document.getElementById('mode-chat').classList.remove('active');
        document.getElementById('mode-shloka').classList.remove('active');
        
        if(mode === 'chat') {
            document.getElementById('mode-chat').classList.add('active');
            inputField.placeholder = "संस्कृतपदं वा वाक्यं वा लिखत... (Type Sanskrit word or question)";
        } else if(mode === 'shloka') {
            document.getElementById('mode-shloka').classList.add('active');
            inputField.placeholder = "अत्र श्लोकं लिखत... (Paste the verse here for detailed analysis)";
        }
        inputField.focus();
    }

    // Box 3 ಮತ್ತು Box 4 ಗಾಗಿ Coming Soon ಸಂದೇಶ
    function showComingSoon(moduleName) {
        const chatBox = document.getElementById('chatBox');
        document.getElementById('welcome-section').style.display = 'none';
        
        const botDiv = document.createElement('div');
        botDiv.className = 'message bot';
        botDiv.innerHTML = `<strong>${moduleName} :</strong> क्षम्यताम्! सद्यः न उपलभ्यते (Coming Soon).<br><span style="color:#c8a060; font-size:0.9em;">We are currently building and uploading the granthas for this search engine. Please check back later.</span>`;
        
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const fileInput = document.getElementById('fileUpload');
        const chatBox = document.getElementById('chatBox');
        
        const messageText = input.value.trim();
        const file = fileInput.files[0];

        if (!messageText && !file) return;

        // ಬಳಕೆದಾರರು ಮೆಸೇಜ್ ಕಳುಹಿಸಿದ ತಕ್ಷಣ ಮೇಲಿನ ಬಾಕ್ಸ್‌ಗಳನ್ನು ಮರೆಮಾಡುವುದು
        document.getElementById('welcome-section').style.display = 'none';

        // ೧. ಬಳಕೆದಾರರ ಮೆಸೇಜ್ ಸ್ಕ್ರೀನ್ ಮೇಲೆ ತೋರಿಸುವುದು
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        
        let displayMsg = messageText;
        if (file) {
            displayMsg += (displayMsg ? '\n\n' : '') + '📎 [File Attached: ' + file.name + ']';
        }
        userDiv.innerText = displayMsg || '📎 [File Attached]';
        chatBox.appendChild(userDiv);
        
        input.value = '';
        document.getElementById('file-info').style.display = 'none';
        chatBox.scrollTop = chatBox.scrollHeight;

        // ೨. ಲೋಡಿಂಗ್ ಬಟನ್ ತೋರಿಸುವುದು
        const botDiv = document.createElement('div');
        botDiv.className = 'message bot loading';
        botDiv.innerText = 'उत्तरं अन्विष्यते...';
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            let fileContentText = "";
            if (file) {
                fileContentText = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsText(file);
                });
            }

            // ೩. ಗುಪ್ತ ಪ್ರಾಂಪ್ಟ್ (Hidden Prompt for Shloka Mode)
            let backendMessage = messageText;
            if (currentMode === 'shloka') {
                backendMessage += "\n\n[SYSTEM INSTRUCTION: The user has provided a Shloka. Analyze it deeply and provide the output strictly under the following headings: 1. पदच्छेदः 2. अन्वयः 3. श्लोकार्थः (Translate to Sanskrit and English) 4. सन्धिः 5. समास-विग्रहः 6. व्याकरणविशेषः (Include शब्दरूप-विश्लेषणम्, धातुरूप-विश्लेषणम्, कृदन्त, तद्धित, अव्यय-परिचयः, कारक-विभक्ति) 7. छन्दः 8. अलङ्कारः 9. रसः 10. श्लोकस्य उल्लेखः (Source & Reference). Do not miss any heading.]";
            }

            fileInput.value = ''; 

            // ೪. ಬ್ಯಾಕೆಂಡ್‌ಗೆ ಕಳುಹಿಸುವುದು (ನಿಮ್ಮ Render ಲಿಂಕ್ ಇಲ್ಲಿದೆ)
            const response = await fetch('https://ai-project-du2m.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: backendMessage, 
                    file_content: fileContentText 
                })
            });

            const data = await response.json();
            botDiv.classList.remove('loading');
            botDiv.innerText = data.reply || 'क्षन्तव्यम्, काचित् त्रुटिः सञ्जाता।';
        } catch (error) {
            botDiv.classList.remove('loading');
            botDiv.innerText = 'क्षन्तव्यम्, सर्वर-सम्पर्कः न जातः।';
        }

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
